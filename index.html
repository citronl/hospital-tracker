<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Health Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117; --surface: #161c26; --surface2: #1e2736; --surface3: #263044;
    --border: #2a3649; --accent: #5ecfb1; --accent-dim: rgba(94,207,177,0.12);
    --text: #e8edf5; --text2: #8a9ab5; --text3: #5a6a82;
    --red: #e05c6a; --red-dim: rgba(224,92,106,0.12);
    --amber: #f0a847; --amber-dim: rgba(240,168,71,0.12);
    --blue: #7b9ef0; --blue-dim: rgba(123,158,240,0.12);
    --radius: 14px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 80px; }

  header { padding: 24px 20px 14px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 1.3rem; font-weight: 600; color: var(--accent); }
  header .sub { font-size: 0.78rem; color: var(--text3); margin-top: 2px; }
  .sync-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.7rem; color: var(--text3); margin-top: 5px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); transition: background 0.3s; }
  .sync-dot.ok { background: var(--accent); }
  .sync-dot.err { background: var(--red); }

  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; overflow-x: auto; }
  .tab-btn { flex: 1; min-width: 60px; padding: 12px 4px; background: none; border: none; color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-pane { display: none; padding: 20px; }
  .tab-pane.active { display: block; }
  .section-title { font-size: 0.85rem; font-weight: 600; color: var(--text2); margin-bottom: 14px; }

  /* MED CARDS */
  .med-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; transition: border-color 0.3s; }
  .med-card.ready { border-color: var(--accent); }
  .med-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .med-name { font-size: 1rem; font-weight: 600; }
  .med-meta { display: flex; align-items: center; gap: 6px; }
  .med-interval { font-size: 0.72rem; color: var(--text3); background: var(--surface2); padding: 3px 8px; border-radius: 20px; }
  .med-delete-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 0.8rem; padding: 3px 6px; border-radius: 4px; transition: color 0.15s, background 0.15s; }
  .med-delete-btn:hover { color: var(--red); background: var(--red-dim); }
  .med-status { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .status-badge { font-size: 0.75rem; font-weight: 500; padding: 4px 10px; border-radius: 20px; }
  .status-badge.ready { background: var(--accent-dim); color: var(--accent); }
  .status-badge.waiting { background: var(--amber-dim); color: var(--amber); }
  .status-badge.never { background: var(--surface2); color: var(--text2); }
  .countdown { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--text2); }
  .last-taken { font-size: 0.72rem; color: var(--text3); margin-bottom: 12px; }
  .strength-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .strength-btn { flex: 1; padding: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .strength-btn.selected { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .take-btn { width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: var(--radius-sm); color: #0d1117; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .take-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .take-btn.disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; transform: none; }
  .backdate-toggle { background: none; border: none; color: var(--text3); font-family: 'DM Sans', sans-serif; font-size: 0.72rem; cursor: pointer; margin-top: 8px; text-decoration: underline; text-decoration-style: dotted; display: block; }
  .backdate-row { display: none; gap: 8px; margin-top: 8px; align-items: center; }
  .backdate-row.show { display: flex; }
  .backdate-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.8rem; padding: 7px 10px; outline: none; }
  .backdate-row input:focus { border-color: var(--accent); }
  .backdate-row button { padding: 7px 12px; background: var(--surface3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; cursor: pointer; }
  .add-med-card { background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 9px 12px; outline: none; margin-bottom: 8px; }
  .form-input::placeholder { color: var(--text3); }
  .form-input:focus { border-color: var(--accent); }
  .field-label { font-size: 0.75rem; color: var(--text3); display: block; margin-bottom: 5px; }
  .field-group { margin-bottom: 10px; }
  .add-med-btn { width: 100%; padding: 10px; background: var(--accent-dim); border: 1px solid var(--accent); border-radius: var(--radius-sm); color: var(--accent); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
  .add-med-btn:hover { background: rgba(94,207,177,0.2); }

  /* FOOD */
  .food-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .food-input-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; padding: 10px 14px; outline: none; }
  .food-input-row input::placeholder { color: var(--text3); }
  .food-input-row input:focus { border-color: var(--accent); }
  .food-input-row button { padding: 10px 16px; background: var(--accent); border: none; border-radius: var(--radius-sm); color: #0d1117; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
  .food-entry { display: flex; align-items: center; padding: 10px 14px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 6px; gap: 8px; }
  .food-entry-text { flex: 1; font-size: 0.88rem; }
  .food-entry-time { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text3); flex-shrink: 0; }
  .food-entry-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1.1rem; line-height: 1; flex-shrink: 0; }
  .food-entry-del:hover { color: var(--red); }

  /* WALK */
  .walk-progress { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; }
  .walk-progress-label { font-size: 0.82rem; color: var(--text2); }
  .walk-progress-count { font-family: 'DM Mono', monospace; font-size: 1rem; color: var(--accent); font-weight: 500; margin-left: 16px; }
  .progress-bar-wrap { background: var(--surface2); border-radius: 4px; height: 4px; margin-top: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
  .walk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .walk-slot { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; user-select: none; }
  .walk-slot.done { background: var(--accent-dim); border-color: var(--accent); }
  .walk-checkbox { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .walk-slot.done .walk-checkbox { background: var(--accent); border-color: var(--accent); }
  .walk-checkmark { color: #0d1117; font-size: 0.7rem; font-weight: 700; display: none; }
  .walk-slot.done .walk-checkmark { display: block; }
  .walk-time { font-family: 'DM Mono', monospace; font-size: 0.88rem; color: var(--text2); }
  .walk-slot.done .walk-time { color: var(--accent); }

  /* WEIGHT */
  .weight-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .weight-stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; text-align: center; }
  .weight-stat-val { font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 500; color: var(--accent); }
  .weight-stat-val.loss { color: var(--amber); }
  .weight-stat-label { font-size: 0.68rem; color: var(--text3); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

  .weight-input-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .weight-input-row { display: flex; gap: 8px; align-items: center; }
  .weight-input-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace; font-size: 1rem; padding: 10px 14px; outline: none; }
  .weight-input-row input::placeholder { color: var(--text3); }
  .weight-input-row input:focus { border-color: var(--accent); }
  .weight-input-row button { padding: 10px 18px; background: var(--accent); border: none; border-radius: var(--radius-sm); color: #0d1117; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
  .weight-today { font-size: 0.75rem; color: var(--text3); margin-top: 8px; }
  .weight-today span { color: var(--accent); font-family: 'DM Mono', monospace; }

  /* GRAPH */
  .graph-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .graph-card .section-title { margin-bottom: 12px; }
  .graph-wrap { position: relative; width: 100%; height: 160px; }
  canvas#weight-chart { width: 100% !important; height: 160px !important; }

  .weight-history-list { }
  .weight-entry { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; }
  .weight-entry-date { font-size: 0.82rem; color: var(--text2); }
  .weight-entry-right { display: flex; align-items: center; gap: 10px; }
  .weight-entry-val { font-family: 'DM Mono', monospace; font-size: 0.95rem; color: var(--accent); font-weight: 500; }
  .weight-entry-diff { font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 2px 7px; border-radius: 20px; }
  .weight-entry-diff.down { background: var(--blue-dim); color: var(--blue); }
  .weight-entry-diff.up   { background: var(--amber-dim); color: var(--amber); }
  .weight-entry-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 1rem; }
  .weight-entry-del:hover { color: var(--red); }

  /* HISTORY */
  .history-date { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin: 16px 0 8px; font-weight: 600; }
  .history-date:first-child { margin-top: 0; }
  .history-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px; font-size: 0.82rem; }
  .history-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .history-dot.med    { background: var(--accent); }
  .history-dot.food   { background: var(--amber); }
  .history-dot.walk   { background: var(--blue); }
  .history-dot.weight { background: #c084fc; }
  .history-item-content { flex: 1; }
  .history-item-name { font-weight: 500; }
  .history-item-detail { color: var(--text3); font-size: 0.75rem; margin-top: 2px; }
  .history-time { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text3); flex-shrink: 0; }
  .empty-state { text-align: center; color: var(--text3); font-size: 0.85rem; padding: 40px 20px; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px 32px; width: 100%; max-width: 480px; }
  .modal h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
  .modal p { font-size: 0.82rem; color: var(--text3); margin-bottom: 20px; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-cancel { flex: 1; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; cursor: pointer; }
  .modal-confirm { flex: 1; padding: 12px; background: var(--accent); border: none; border-radius: var(--radius-sm); color: #0d1117; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
  .modal-confirm.danger { background: var(--red); color: #fff; }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; gap: 12px; }
  .loading-overlay p { color: var(--text3); font-size: 0.85rem; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <p>Connecting to Firebase…</p>
</div>

<header>
  <h1>🏥 My Health Tracker</h1>
  <p class="sub" id="header-date">Loading…</p>
  <div class="sync-badge"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Connecting…</span></div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="meds"    onclick="switchTab(this)">💊 Meds</button>
  <button class="tab-btn"        data-tab="food"    onclick="switchTab(this)">🥤 Food</button>
  <button class="tab-btn"        data-tab="walk"    onclick="switchTab(this)">🚶 Walk</button>
  <button class="tab-btn"        data-tab="weight"  onclick="switchTab(this)">⚖️ Weight</button>
  <button class="tab-btn"        data-tab="history" onclick="switchTab(this)">📋 History</button>
</div>

<!-- MEDS -->
<div id="tab-meds" class="tab-pane active">
  <div id="med-list"></div>
  <div class="add-med-card">
    <div class="section-title">＋ Add a medication</div>
    <div class="field-group">
      <label class="field-label">Medication name</label>
      <input class="form-input" type="text" id="new-med-name" placeholder="e.g. Tramadol">
    </div>
    <div class="field-group">
      <label class="field-label">Hours between doses</label>
      <input class="form-input" type="number" id="new-med-hours" placeholder="e.g. 6" min="1" max="72">
    </div>
    <div class="field-group">
      <label class="field-label">Dose strengths — optional (comma separated, e.g. 2.5mg, 5mg)</label>
      <input class="form-input" type="text" id="new-med-strengths" placeholder="Leave blank if only one strength">
    </div>
    <button class="add-med-btn" onclick="addMed()">Add Medication</button>
  </div>
</div>

<!-- FOOD -->
<div id="tab-food" class="tab-pane">
  <p class="section-title">Today's food & drink log</p>
  <div class="food-input-row">
    <input type="text" id="food-input" placeholder="e.g. half a Fortisip, 2 crackers…" onkeydown="if(event.key==='Enter')addFood()">
    <button onclick="addFood()">Add</button>
  </div>
  <div id="food-list"></div>
</div>

<!-- WALK -->
<div id="tab-walk" class="tab-pane">
  <p class="section-title">Hourly walks — 9:30am to 9:30pm</p>
  <div class="walk-progress">
    <div style="flex:1">
      <div class="walk-progress-label">Walks completed today</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="walk-bar" style="width:0%"></div></div>
    </div>
    <div class="walk-progress-count" id="walk-count">0 / 13</div>
  </div>
  <div class="walk-grid" id="walk-grid"></div>
</div>

<!-- WEIGHT -->
<div id="tab-weight" class="tab-pane">
  <div class="weight-summary">
    <div class="weight-stat"><div class="weight-stat-val" id="ws-current">—</div><div class="weight-stat-label">Current</div></div>
    <div class="weight-stat"><div class="weight-stat-val" id="ws-highest">—</div><div class="weight-stat-label">Highest</div></div>
    <div class="weight-stat"><div class="weight-stat-val loss" id="ws-lost">—</div><div class="weight-stat-label">Lost</div></div>
  </div>
  <div class="weight-input-card">
    <p class="section-title">Log today's weight</p>
    <div class="weight-input-row">
      <input type="number" id="weight-input" placeholder="e.g. 62.4" step="0.1" min="20" max="300">
      <button onclick="logWeight()">Save</button>
    </div>
    <div class="weight-today" id="weight-today-label"></div>
  </div>
  <div class="graph-card">
    <div class="section-title">Trend</div>
    <div class="graph-wrap"><canvas id="weight-chart"></canvas></div>
  </div>
  <p class="section-title">History</p>
  <div id="weight-history-list"></div>
</div>

<!-- HISTORY -->
<div id="tab-history" class="tab-pane">
  <p class="section-title">Full history</p>
  <div id="history-list"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Confirm</h3>
    <p id="modal-body"></p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" id="modal-ok" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDR50ZDdjmN5qgihvbY508HY55NcTmpKfc",
  authDomain: "hospital-tracker-f1faf.firebaseapp.com",
  projectId: "hospital-tracker-f1faf",
  storageBucket: "hospital-tracker-f1faf.firebasestorage.app",
  messagingSenderId: "412384717901",
  appId: "1:412384717901:web:dc7c0361439c2b992a0004"
});
const db = getFirestore(app);
const DATA_REF   = doc(db, 'tracker', 'data');
const CONFIG_REF = doc(db, 'tracker', 'config');
const WEIGHT_REF = doc(db, 'tracker', 'weight');

const WALK_TIMES = ['09:30','10:30','11:30','12:30','13:30','14:30','15:30','16:30','17:30','18:30','19:30','20:30','21:30'];
const DEFAULT_MEDS = [
  { id:'cyclizine',      name:'Cyclizine',      hours:8 },
  { id:'chlorphenamine', name:'Chlorphenamine',  hours:4 },
  { id:'paracetamol',    name:'Paracetamol',     hours:4 },
  { id:'buscopan',       name:'Buscopan',        hours:6 },
  { id:'stemetil',       name:'Stemetil',        hours:8 },
  { id:'oxycodone',      name:'Oxycodone',       hours:4, strengths:['2.5mg','5mg'] },
];

let state = {}, meds = [], weightLog = {}, selStr = {}, pendingAction = null, weightChart = null;

const todayKey = () => { const d=new Date(); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; };
const p = n => String(n).padStart(2,'0');
const fmt = ts => ts ? new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—';
const fmtDate = k => {
  const [y,m,d]=k.split('-').map(Number), date=new Date(y,m-1,d);
  const today=new Date(); today.setHours(0,0,0,0);
  const yest=new Date(today); yest.setDate(today.getDate()-1); date.setHours(0,0,0,0);
  if(date.getTime()===today.getTime()) return 'Today';
  if(date.getTime()===yest.getTime())  return 'Yesterday';
  return date.toLocaleDateString([],{weekday:'long',day:'numeric',month:'long'});
};
const fmtDateShort = k => {
  const [y,m,d]=k.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString([],{day:'numeric',month:'short'});
};
const cd = (ts,h) => { if(!ts) return null; const diff=(ts+h*3600000)-Date.now(); if(diff<=0) return 'Ready'; const hh=Math.floor(diff/3600000),mm=Math.floor((diff%3600000)/60000),ss=Math.floor((diff%60000)/1000); return `${p(hh)}:${p(mm)}:${p(ss)}`; };
const getToday = () => { const k=todayKey(); if(!state[k]) state[k]={meds:{},food:[],walks:{}}; return state[k]; };

// sync
const setSync = s => {
  const dot=document.getElementById('sync-dot'), lbl=document.getElementById('sync-label');
  if(s==='ok'){dot.className='sync-dot ok';lbl.textContent='Synced';}
  if(s==='err'){dot.className='sync-dot err';lbl.textContent='Sync error';}
  if(s==='load'){dot.className='sync-dot';lbl.textContent='Loading…';}
};
const saveData   = async () => { try{ await setDoc(DATA_REF,state); setSync('ok'); }catch{ setSync('err'); } };
const saveCfg    = async () => { try{ await setDoc(CONFIG_REF,{meds}); setSync('ok'); }catch{ setSync('err'); } };
const saveWeight = async () => { try{ await setDoc(WEIGHT_REF,weightLog); setSync('ok'); }catch{ setSync('err'); } };

// modal
const openModal = (title,body,onOk,danger=false) => {
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').textContent=body;
  document.getElementById('modal-ok').className='modal-confirm'+(danger?' danger':'');
  pendingAction=onOk;
  document.getElementById('modal').classList.add('show');
};
window.closeModal = () => { pendingAction=null; document.getElementById('modal').classList.remove('show'); };
window.confirmAction = () => { if(pendingAction) pendingAction(); window.closeModal(); };
document.getElementById('modal').addEventListener('click', e=>{ if(e.target===document.getElementById('modal')) window.closeModal(); });

// ── MEDS ─────────────────────────────────────────────────────────────────────
window.openTake = (medId, strength, bdVal) => {
  const med=meds.find(m=>m.id===medId);
  let ts=Date.now();
  if(bdVal){ const [hh,mm]=bdVal.split(':').map(Number); const d=new Date(); d.setHours(hh,mm,0,0); ts=d.getTime(); }
  openModal(
    `Record ${med.name}${strength?' '+strength:''}`,
    bdVal?`Record dose taken at ${bdVal} today?`:`Record dose taken now (${fmt(ts)})?`,
    async()=>{ const t=getToday(); t.meds[medId]={ts,strength:strength||null}; await saveData(); renderMeds(); renderHistory(); }
  );
};
window.deleteMed = medId => {
  const med=meds.find(m=>m.id===medId);
  openModal(`Remove ${med.name}?`,'This removes it from the list. Your history is kept.',
    async()=>{ meds=meds.filter(m=>m.id!==medId); await saveCfg(); renderMeds(); }, true);
};
window.addMed = async () => {
  const name=document.getElementById('new-med-name').value.trim();
  const hours=parseInt(document.getElementById('new-med-hours').value);
  const strRaw=document.getElementById('new-med-strengths').value.trim();
  if(!name){ alert('Please enter a medication name.'); return; }
  if(!hours||hours<1){ alert('Please enter a valid number of hours.'); return; }
  const strengths=strRaw?strRaw.split(',').map(s=>s.trim()).filter(Boolean):null;
  const id=name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')+'-'+Date.now();
  const newMed={id,name,hours};
  if(strengths&&strengths.length) newMed.strengths=strengths;
  meds.push(newMed);
  await saveCfg();
  document.getElementById('new-med-name').value='';
  document.getElementById('new-med-hours').value='';
  document.getElementById('new-med-strengths').value='';
  renderMeds();
};

function renderMeds() {
  const today=getToday(), container=document.getElementById('med-list');
  container.innerHTML='';
  meds.forEach(med=>{
    const rec=today.meds[med.id], ts=rec?rec.ts:null, cds=cd(ts,med.hours), ready=!ts||cds==='Ready';
    const card=document.createElement('div'); card.className=`med-card ${ready?'ready':'waiting'}`;
    card.innerHTML=`
      <div class="med-header">
        <span class="med-name">${med.name}</span>
        <div class="med-meta">
          <span class="med-interval">every ${med.hours}h</span>
          <button class="med-delete-btn" onclick="deleteMed('${med.id}')" title="Remove">✕</button>
        </div>
      </div>
      <div class="med-status">
        <span class="status-badge ${ts?(ready?'ready':'waiting'):'never'}">${ts?(ready?'Ready':'Waiting'):'Not yet taken'}</span>
        ${(ts&&!ready)?`<span class="countdown" id="cd-${med.id}">${cds}</span>`:''}
      </div>
      ${ts?`<div class="last-taken">Last taken: ${fmt(ts)}${rec.strength?' · '+rec.strength:''}</div>`:''}
    `;
    if(med.strengths){
      const row=document.createElement('div'); row.className='strength-row';
      med.strengths.forEach(str=>{
        const btn=document.createElement('button');
        btn.className=`strength-btn${selStr[med.id]===str?' selected':''}`;
        btn.textContent=str;
        btn.onclick=()=>{ selStr[med.id]=str; renderMeds(); };
        row.appendChild(btn);
      });
      card.appendChild(row);
    }
    const needsStr=med.strengths&&!selStr[med.id];
    const tb=document.createElement('button');
    tb.className=`take-btn${needsStr?' disabled':''}`;
    tb.textContent=needsStr?'Select a strength above':`Record ${med.name}`;
    if(!needsStr) tb.onclick=()=>{ const bi=card.querySelector('.backdate-input'); window.openTake(med.id,selStr[med.id]||null,bi&&bi.value?bi.value:null); };
    card.appendChild(tb);
    const bdTog=document.createElement('button'); bdTog.className='backdate-toggle';
    bdTog.textContent='Backdate (took it earlier?)';
    bdTog.onclick=()=>card.querySelector('.backdate-row').classList.toggle('show');
    card.appendChild(bdTog);
    const bdRow=document.createElement('div'); bdRow.className='backdate-row';
    bdRow.innerHTML=`<input type="time" class="backdate-input"><button onclick="this.parentElement.classList.remove('show')">✕</button>`;
    card.appendChild(bdRow);
    container.appendChild(card);
  });
}

// ── FOOD ─────────────────────────────────────────────────────────────────────
window.addFood = async () => {
  const inp=document.getElementById('food-input'), text=inp.value.trim();
  if(!text) return;
  const t=getToday(); if(!t.food) t.food=[];
  t.food.push({text,ts:Date.now()}); inp.value='';
  await saveData(); renderFood(); renderHistory();
};
window.deleteFood = async idx => {
  const t=getToday(); t.food.splice(idx,1);
  await saveData(); renderFood(); renderHistory();
};
function renderFood(){
  const t=getToday(), list=document.getElementById('food-list'); list.innerHTML='';
  if(!t.food||!t.food.length){ list.innerHTML='<div class="empty-state">No entries yet today.</div>'; return; }
  t.food.forEach((item,i)=>{
    const d=document.createElement('div'); d.className='food-entry';
    d.innerHTML=`<span class="food-entry-text">${item.text}</span><span class="food-entry-time">${fmt(item.ts)}</span><button class="food-entry-del" onclick="deleteFood(${i})">×</button>`;
    list.appendChild(d);
  });
}

// ── WALKS ────────────────────────────────────────────────────────────────────
window.toggleWalk = async time => {
  const t=getToday(); if(!t.walks) t.walks={};
  t.walks[time]=!t.walks[time];
  await saveData(); renderWalks(); renderHistory();
};
function renderWalks(){
  const t=getToday(), grid=document.getElementById('walk-grid'); grid.innerHTML=''; let done=0;
  WALK_TIMES.forEach(time=>{
    const isDone=!!(t.walks&&t.walks[time]); if(isDone) done++;
    const s=document.createElement('div'); s.className=`walk-slot${isDone?' done':''}`;
    s.onclick=()=>window.toggleWalk(time);
    s.innerHTML=`<div class="walk-checkbox"><span class="walk-checkmark">✓</span></div><span class="walk-time">${time}</span>`;
    grid.appendChild(s);
  });
  document.getElementById('walk-count').textContent=`${done} / 13`;
  document.getElementById('walk-bar').style.width=`${(done/13)*100}%`;
}

// ── WEIGHT ───────────────────────────────────────────────────────────────────
window.logWeight = async () => {
  const inp = document.getElementById('weight-input');
  const val = parseFloat(inp.value);
  if(!val || val < 20 || val > 300) { alert('Please enter a valid weight in kg.'); return; }
  const k = todayKey();
  weightLog[k] = { kg: val, ts: Date.now() };
  inp.value = '';
  await saveWeight();
  renderWeight();
  renderHistory();
};

window.deleteWeight = async key => {
  openModal('Remove this entry?', `Delete weight for ${fmtDate(key)}?`,
    async () => { delete weightLog[key]; await saveWeight(); renderWeight(); renderHistory(); }, true);
};

function renderWeight() {
  const keys = Object.keys(weightLog).sort();
  const today = todayKey();
  const todayEntry = weightLog[today];

  // Summary stats
  if(keys.length) {
    const latest = weightLog[keys[keys.length-1]].kg;
    const highest = Math.max(...keys.map(k=>weightLog[k].kg));
    const lost = highest - latest;
    document.getElementById('ws-current').textContent = latest.toFixed(1)+' kg';
    document.getElementById('ws-highest').textContent = highest.toFixed(1)+' kg';
    document.getElementById('ws-lost').textContent = lost > 0 ? '-'+lost.toFixed(1)+' kg' : '0 kg';
  } else {
    document.getElementById('ws-current').textContent = '—';
    document.getElementById('ws-highest').textContent = '—';
    document.getElementById('ws-lost').textContent = '—';
  }

  // Today label
  const todayLbl = document.getElementById('weight-today-label');
  todayLbl.innerHTML = todayEntry
    ? `Today's entry: <span>${todayEntry.kg.toFixed(1)} kg</span> — tap Save to update`
    : 'No entry yet for today';

  // Graph
  if(keys.length >= 2) {
    const labels = keys.map(k => fmtDateShort(k));
    const data   = keys.map(k => weightLog[k].kg);
    const minVal = Math.min(...data) - 1;
    const maxVal = Math.max(...data) + 1;

    if(weightChart) { weightChart.destroy(); }
    const ctx = document.getElementById('weight-chart').getContext('2d');
    weightChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data,
          borderColor: '#5ecfb1',
          backgroundColor: 'rgba(94,207,177,0.08)',
          borderWidth: 2,
          pointBackgroundColor: '#5ecfb1',
          pointRadius: 4,
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => ctx.parsed.y.toFixed(1)+' kg' },
          backgroundColor: '#1e2736', titleColor: '#8a9ab5', bodyColor: '#e8edf5', borderColor: '#2a3649', borderWidth: 1,
        }},
        scales: {
          x: { ticks: { color: '#5a6a82', font: { size: 10 } }, grid: { color: '#1e2736' } },
          y: { min: minVal, max: maxVal, ticks: { color: '#5a6a82', font: { size: 10 }, callback: v => v.toFixed(1) }, grid: { color: '#1e2736' } }
        }
      }
    });
    document.querySelector('.graph-card').style.display = '';
  } else {
    if(weightChart) { weightChart.destroy(); weightChart=null; }
    document.querySelector('.graph-card').style.display = keys.length < 2 ? 'none' : '';
  }

  // History list
  const list = document.getElementById('weight-history-list');
  list.innerHTML = '';
  if(!keys.length){ list.innerHTML='<div class="empty-state">No weight entries yet.<br>Log your first weight above.</div>'; return; }
  [...keys].reverse().forEach((k, i) => {
    const entry = weightLog[k];
    const prevKey = keys[keys.length - 1 - i - 1];
    const prevEntry = prevKey ? weightLog[prevKey] : null;
    const diff = prevEntry ? (entry.kg - prevEntry.kg) : null;
    const el = document.createElement('div'); el.className='weight-entry';
    let diffHtml = '';
    if(diff !== null) {
      const sign = diff < 0 ? '' : '+';
      const cls  = diff <= 0 ? 'down' : 'up';
      diffHtml = `<span class="weight-entry-diff ${cls}">${sign}${diff.toFixed(1)}</span>`;
    }
    el.innerHTML=`
      <span class="weight-entry-date">${fmtDate(k)}</span>
      <div class="weight-entry-right">
        <span class="weight-entry-val">${entry.kg.toFixed(1)} kg</span>
        ${diffHtml}
        <button class="weight-entry-del" onclick="deleteWeight('${k}')">×</button>
      </div>`;
    list.appendChild(el);
  });
}

// ── HISTORY ──────────────────────────────────────────────────────────────────
function renderHistory(){
  const list=document.getElementById('history-list'); list.innerHTML='';
  const allKeys = new Set([...Object.keys(state), ...Object.keys(weightLog)]);
  const days=[...allKeys].sort((a,b)=>b.localeCompare(a));
  if(!days.length){ list.innerHTML='<div class="empty-state">No history yet.</div>'; return; }
  days.forEach(key=>{
    const day=state[key]||{}; let evs=[];
    Object.entries(day.meds||{}).forEach(([id,r])=>{ const m=meds.find(x=>x.id===id); evs.push({ts:r.ts,type:'med',name:m?m.name:id,detail:r.strength||''}); });
    (day.food||[]).forEach(f=>evs.push({ts:f.ts,type:'food',name:f.text,detail:''}));
    Object.entries(day.walks||{}).forEach(([t,done])=>{ if(done) evs.push({ts:null,type:'walk',name:`Walk at ${t}`,detail:'Completed',st:t}); });
    if(weightLog[key]) evs.push({ts:weightLog[key].ts,type:'weight',name:'Weight logged',detail:`${weightLog[key].kg.toFixed(1)} kg`});
    evs.sort((a,b)=>(b.ts||0)-(a.ts||0));
    if(!evs.length) return;
    const dl=document.createElement('div'); dl.className='history-date'; dl.textContent=fmtDate(key); list.appendChild(dl);
    evs.forEach(ev=>{
      const el=document.createElement('div'); el.className='history-item';
      el.innerHTML=`<div class="history-dot ${ev.type}"></div><div class="history-item-content"><div class="history-item-name">${ev.name}</div>${ev.detail?`<div class="history-item-detail">${ev.detail}</div>`:''}</div><div class="history-time">${ev.ts?fmt(ev.ts):(ev.st||'')}</div>`;
      list.appendChild(el);
    });
  });
}

// ── COUNTDOWN ────────────────────────────────────────────────────────────────
setInterval(()=>{
  const t=getToday();
  meds.forEach(m=>{ const r=t.meds[m.id]; if(!r) return; const c=cd(r.ts,m.hours); const el=document.getElementById(`cd-${m.id}`); if(el){ if(c==='Ready') renderMeds(); else el.textContent=c; } });
},1000);

// ── TABS ─────────────────────────────────────────────────────────────────────
window.switchTab = btn => {
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  btn.classList.add('active');
  if(btn.dataset.tab==='history') renderHistory();
  if(btn.dataset.tab==='weight') renderWeight();
};

// ── INIT ─────────────────────────────────────────────────────────────────────
setSync('load');
(async()=>{
  try{
    const [cfgSnap,dataSnap,wSnap]=await Promise.all([getDoc(CONFIG_REF),getDoc(DATA_REF),getDoc(WEIGHT_REF)]);
    meds   = cfgSnap.exists()&&cfgSnap.data().meds ? cfgSnap.data().meds : DEFAULT_MEDS;
    state  = dataSnap.exists() ? dataSnap.data() : {};
    weightLog = wSnap.exists() ? wSnap.data() : {};
    if(!cfgSnap.exists()||!cfgSnap.data().meds) await saveCfg();

    document.getElementById('loading').style.display='none';
    document.getElementById('header-date').textContent=new Date().toLocaleDateString([],{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    setSync('ok');

    renderMeds(); renderFood(); renderWalks(); renderWeight();

    onSnapshot(DATA_REF,   snap=>{ if(snap.exists()){ state=snap.data(); renderMeds(); renderFood(); renderWalks(); if(document.getElementById('tab-history').classList.contains('active')) renderHistory(); } setSync('ok'); });
    onSnapshot(CONFIG_REF, snap=>{ if(snap.exists()&&snap.data().meds){ meds=snap.data().meds; renderMeds(); } });
    onSnapshot(WEIGHT_REF, snap=>{ if(snap.exists()){ weightLog=snap.data(); if(document.getElementById('tab-weight').classList.contains('active')) renderWeight(); if(document.getElementById('tab-history').classList.contains('active')) renderHistory(); } setSync('ok'); });
  }catch(e){ console.error(e); document.getElementById('loading').style.display='none'; setSync('err'); }
})();
</script>
</body>
</html>
